<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSC Registration</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/CSSFiles/joinUs.css" rel="stylesheet">

    <style>
    body {
        /* This creates a clearer white-to-light-blue vertical transition */
        background: linear-gradient(to bottom, #ffffff 0%, #bbdefb 100%);
        background-attachment: fixed; /* Keeps the background from scrolling */
        min-height: 100vh;
    }
    
    .main-container {
        padding-top: 50px;
    }

    /* Optional: making the card slightly transparent to show the blue behind it */
    .card {
        background-color: rgba(255, 255, 255, 0.95);
        border-radius: 15px;
    }
    .form-logo {
        height: 120px;
        width: auto;
        mix-blend-mode: multiply; /* Removes white background from logo */
        filter: contrast(110%);
        margin-bottom: 20px;
    }
</style>
    </style>
</head>

<body>

<div class="container my-5 main-container">

    <div class="text-center mb-5">
        <img src="/Assests/MSClogo.png" alt="MSC Logo" class="form-logo">
        
        <h1 class="fw-bold" style="color: #00296B;">Math & Science Club Registration Form</h1>
        <p class="text-muted">Please fill in your profile and academic information to join us at INPT</p>
    </div>

    <div class="card shadow-lg border-0" style="border-radius: 15px;">
        <div class="card-body p-4 p-md-5">

            <form id="registrationForm" class="needs-validation" novalidate>

                <h4 class="mb-3" style="color: #00509D;">Profile Information</h4>
                <div class="row g-3">

                    <div class="col-md-6">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-control" name="fullName" placeholder="Hassan Farsi" required>
                        <div class="invalid-feedback">Please enter your full name.</div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" name="email" required>
                        <div class="invalid-feedback">Please enter a valid email.</div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" name="password" minlength="8" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Date of Birth</label>
                        <input type="date" class="form-control" name="dob" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Phone Number</label>
                        <input type="tel" class="form-control" name="phone" placeholder="+212 6XXXXXXXX" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Gender</label>
                        <select class="form-select" name="gender" required>
                            <option value="">-- Select --</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Upload Profile Picture</label>
                        <input type="file" class="form-control" id="photo" accept="image/*">
                    </div>

                    <div class="col-md-6 text-center">
                        <img id="photoPreview" class="img-thumbnail mt-2" style="max-height:150px; display:none;">
                    </div>

                </div>

                <hr class="my-4">

                <h4 class="mb-3" style="color: #00509D;">Student Information</h4>
                <div class="row g-3">

                    <div class="col-md-6">
                        <label class="form-label">Student ID</label>
                        <input type="number" class="form-control" name="studentId" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label d-block">Cycle</label>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="cycle" value="engineering" required>
                            <label class="form-check-label">Engineering</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="cycle" value="master">
                            <label class="form-check-label">Master</label>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Sector</label>
                        <select class="form-select" name="department">
                            <option>AMOA</option>
                            <option>ASEDS</option>
                            <option>DATA</option>
                            <option>ICCN</option>
                            <option>SESNUM</option>
                            <option>SMART</option>
                            <option selected>SUD</option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label d-block">Skills</label>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="checkbox" value="html">
                            <label class="form-check-label">HTML</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="checkbox" value="css">
                            <label class="form-check-label">CSS</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="checkbox" value="js">
                            <label class="form-check-label">JavaScript</label>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Favorite Professor</label>
                        <select class="form-select">
                            <option selected>Hassan Farsi</option>
                            <option>Other professor</option>
                            <option>You</option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Level of Satisfaction (1-10)</label>
                        <input type="range" class="form-range" min="1" max="10">
                    </div>

                    <div class="col-12">
                        <label class="form-label">Additional Notes</label>
                        <textarea class="form-control" rows="4" placeholder="Your message..."></textarea>
                    </div>

                </div>

                <hr class="my-4">

                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" required>
                    <label class="form-check-label">
                        I accept the terms and conditions
                    </label>
                </div>

                <div class="d-flex justify-content-between">
                    <button type="reset" class="btn btn-outline-secondary">Reset</button>
                    <button type="submit" class="btn btn-primary" style="background-color: #00509D; border: none;">Register</button>
                </div>

            </form>
        </div>
    </div>

    <div class="text-center mt-4">
        <small class="text-muted">© 2026 INPT - All rights reserved</small>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/JSFiles/joinUs.js"></script>

</body>
</html>
